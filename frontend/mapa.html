<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de salidas — Así Salgo!</title>
    <meta name="description"
        content="Parques, plazas, espacios deportivos y puntos turísticos de Rosario y Buenos Aires en un mapa interactivo.">
    <meta property="og:title" content="Mapa de salidas — Así Salgo!">
    <meta property="og:description" content="Un mapa con espacios públicos para salir cerca tuyo, en Rosario y Buenos Aires.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/og-salida.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="Así Salgo! — Menos scroll. Más ciudad.">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/nav.css">
    <link rel="stylesheet" href="css/toast.css">
    <link rel="stylesheet" href="css/viaje.css">
    <link rel="stylesheet" href="css/paginas.css">
    <link rel="stylesheet" href="css/mapa.css">
</head>

<body data-pagina="mapa">

    <div id="nav-raiz" class="nav-sitio"></div>

    <main class="pagina pagina-mapa">
        <header class="pagina-hero pagina-hero--chica">
            <p class="eyebrow">Espacios públicos</p>
            <h1>Mapa de salidas.</h1>
            <p class="pagina-hero__lead">
                Parques, plazas, espacios deportivos, puntos turísticos y espacios culturales de Rosario y Buenos Aires.
            </p>
        </header>

        <div class="controles-mapa">
            <fieldset class="filtros">
                <legend>Ciudad</legend>
                <div class="chips" role="group" aria-label="Ciudad" id="chips-ciudad-mapa"></div>
            </fieldset>

            <fieldset class="filtros filtros--categorias">
                <legend>Categorías</legend>
                <div class="opciones-checkbox" id="categorias-mapa">
                    <label class="checkbox">
                        <input type="checkbox" value="parques" checked>
                        Parques
                    </label>
                    <label class="checkbox">
                        <input type="checkbox" value="plazas" checked>
                        Plazas
                    </label>
                    <label class="checkbox">
                        <input type="checkbox" value="deporte" checked>
                        Deporte
                    </label>
                    <label class="checkbox">
                        <input type="checkbox" value="turismo" checked>
                        Turismo
                    </label>
                    <label class="checkbox">
                        <input type="checkbox" value="cultural">
                        Cultura
                    </label>
                </div>
            </fieldset>

            <button class="cta-principal" type="button" id="usar-ubicacion-mapa">
                Usar mi ubicación <span aria-hidden="true">→</span>
            </button>
        </div>

        <p id="estado-mapa" role="status" class="lector"></p>
        <p class="mapa-aviso" id="aviso-mapa" hidden></p>

        <div class="mapa-contenedor" id="mapa" role="img" aria-label="Mapa interactivo de lugares para salir"></div>

        <section class="mapa-lista" aria-label="Lista de lugares mostrados en el mapa">
            <h2 class="mapa-lista__titulo">Lugares en el mapa</h2>
            <div class="eventos" id="lista-lugares-mapa"></div>
        </section>
    </main>

    <footer id="pie-raiz" class="pie-sitio"></footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="js/ciudades.js"></script>
    <script src="js/puerta.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/eventos.js"></script>
    <script src="js/mapa.js"></script>
</body>

</html>
