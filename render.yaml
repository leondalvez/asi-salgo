# Render.com — plan Free, $0/mes
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: asi-salgo
    runtime: node
    rootDir: server
    buildCommand: npm install && node -e "const fs=require('fs');const html=fs.readFileSync('../frontend/viaje.html','utf8');if(html.includes('class=\"titulo-viaje\"')||!html.includes('viaje-toolbar')){console.error('frontend/viaje.html desactualizado en el deploy');process.exit(1)}"
    startCommand: node index.js
    healthCheckPath: /api/health
    plan: free
    envVars:
      - key: NODE_VERSION
        value: "20"
